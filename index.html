<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Birthday Letter</title>
    <style>
        :root {
            --bg1: #ff7eb3;
            --bg2: #ff758c;
            --bg3: #ffd56b;
            --ink: #1f2937;
            --paper: #fffaf3;
        }

        * {
            box-sizing: border-box
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: system-ui, Segoe UI, Roboto;
            background: radial-gradient(800px 400px at 10% 10%, #fff3, transparent),
                radial-gradient(900px 500px at 90% 20%, #fff2, transparent),
                linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
            overflow: hidden;
            color: white;
        }

        /* confetti */
        .confetti {
            position: fixed;
            inset: 0;
            pointer-events: none
        }

        .piece {
            position: absolute;
            width: 8px;
            height: 12px;
            opacity: .9;
            animation: fall linear infinite
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg)
            }
        }

        .wrap {
            transform: translateY(-100px);
            text-align: center
        }

        h1 {
            margin-bottom: 6px
        }

        p {
            opacity: .9;
            margin-top: 0
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 14px;
            background: white;
            color: #ff4d6d;
            font-weight: 700;
            cursor: pointer
        }

        .envelope {
            margin-top: -30px;
            width: 340px;
            height: 220px;
            position: relative;
            margin-top: 20px
        }

        .env-back {
            position: absolute;
            inset: 0;
            background: #fff;
            border-radius: 14px
        }

        .env-flap {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 55%;
            background: #ff4d6d;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            transform-origin: top;
            transition: 1s
        }

        .opened .env-flap {
            transform: rotateX(180deg)
        }

        .letter {
            position: absolute;
            left: 50%;
            top: 20px;
            transform: translateX(-50%) translateY(130px);
            opacity: 0;
            background: var(--paper);
            color: var(--ink);
            padding: 18px;
            border-radius: 14px;
            width: 280px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, .3);
            transition: 1s;
        }

        .opened .letter {
            transform: translateX(-50%) translateY(-10px);
            opacity: 1
        }

        h3 {
            margin: 0 0 10px;
            font-size: 18px
        }

        .content {
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 14px
        }

        .cursor {
            display: inline-block;
            width: 6px;
            height: 1em;
            background: #111;
            animation: blink 1s infinite
        }

        @keyframes blink {
            50% {
                opacity: 0
            }
        }

        .modal {
            position: fixed;
            inset: 0;
            display: none;
            place-items: center;
            background: #0008
        }

        .modal.show {
            display: grid
        }

        .dialog {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 14px
        }

        input {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ddd
        }
    </style>
</head>

<body>

    <div class="confetti" id="confetti"></div>

    <div class="wrap">
        <h1>🎂 A Birthday Surprise 🎉</h1>
        <p>Open it and make a wish ✨</p>
        <button class="btn" id="openBtn">Open letter</button>

        <div id="stage">
            <div class="envelope">
                <div class="env-back"></div>
                <div class="env-flap"></div>

                <div class="letter">
                    <h3>Happy Birthday 🎉</h3>
                    <div class="content" id="content"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="dialog">
            <p>Your name?</p>
            <input id="nameInput" />
        </div>
    </div>

    <audio id="bgm" loop>
        <source src="birthday.mp3" type="audio/mpeg">
    </audio>

    <script>
        // confetti
        const cf = document.getElementById('confetti');
        for (let i = 0; i < 60; i++) {
            let d = document.createElement('div');
            d.className = 'piece';
            d.style.left = Math.random() * 100 + 'vw';
            d.style.background = `hsl(${Math.random() * 360},80%,60%)`;
            d.style.animationDuration = 4 + Math.random() * 4 + 's';
            d.style.animationDelay = Math.random() * 3 + 's';
            cf.appendChild(d);
        }

        const modal = document.getElementById('modal');
        const input = document.getElementById('nameInput');
        const btn = document.getElementById('openBtn');
        const stage = document.getElementById('stage');
        const content = document.getElementById('content');

        btn.onclick = () => modal.classList.add('show');

        input.addEventListener('keydown', async e => {
            if (e.key === 'Enter') {
                modal.classList.remove('show');
                let name = input.value || 'my dear';
                document.getElementById('bgm').play();
                stage.classList.add('opened');

                const lines = [
                    `🎂 Dear ${name},`,
                    ``,
                    `Today is your special day,`,
                    `a reminder that the world became brighter`,
                    `because you are in it ✨`,
                    ``,
                    `I wish you:`,
                    `💫 endless happiness`,
                    `🌟 dreams coming true`,
                    `❤️ love that surrounds you`,
                    ``,
                    `Keep shining, keep smiling,`,
                    `and never forget how special you are.`,
                    ``,
                    `🎁 Happy Birthday 🎉`
                ];

                await type(lines);
            }
        });

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        async function type(lines) {
            content.innerHTML = '';
            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            content.appendChild(cursor);

            for (let line of lines) {
                for (let ch of line + '\n') {
                    cursor.insertAdjacentText('beforebegin', ch);
                    await sleep(35);
                }
                await sleep(120);
            }
        }
    </script>

</body>

</html>
